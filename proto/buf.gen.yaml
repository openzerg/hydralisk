version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../packages/api/generated
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ../packages/api/generated
    opt:
      - paths=source_relative
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/openzerg/hydralisk/packages/api/generated